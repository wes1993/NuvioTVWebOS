name: Update webOS Apps JSON

on:
  schedule:
    - cron: '0 */6 * * *' # Controlla automaticamente ogni 6 ore
  workflow_dispatch: # Permette l'avvio manuale

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del tuo Fork
        uses: actions/checkout@v5

      - name: Recupera i dati da GitHub e aggiorna il JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Scarica il payload dell'ultima release usando le API di GitHub
          RELEASE_DATA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/NuvioMedia/NuvioWeb/releases/latest)
          
          # 2. Estrai la versione (rimuovendo l'eventuale 'v' iniziale)
          VERSION=$(echo "$RELEASE_DATA" | jq -r '.tag_name' | sed 's/^v//')
          
          # 3. Filtra l'asset che finisce con .ipk ed estrai URL, Size e Digest
          IPK_ASSET=$(echo "$RELEASE_DATA" | jq '.assets[] | select(.name | endswith(".ipk"))')
          
          IPK_URL=$(echo "$IPK_ASSET" | jq -r '.browser_download_url')
          IPK_SIZE=$(echo "$IPK_ASSET" | jq -r '.size')
          RAW_DIGEST=$(echo "$IPK_ASSET" | jq -r '.digest')
          
          # Rimuovi il prefisso "sha256:" dall'hash se presente
          IPK_HASH=$(echo "$RAW_DIGEST" | sed 's/^sha256://')

          # Verifica di sicurezza: se non trova l'IPK interrompe l'action
          if [ -z "$IPK_HASH" ] || [ "$IPK_HASH" == "null" ]; then
            echo "Errore: Impossibile recuperare i dati dell'IPK da GitHub."
            exit 1
          fi

          echo "Rilevato su GitHub -> Versione: $VERSION | Size: $IPK_SIZE | Hash: $IPK_HASH"

          # 4. Leggi i valori attuali nella sezione "packages" del tuo file apps.json
          CURRENT_VERSION=$(jq -r '.packages[0].manifest.version' webosbrew/apps.json)
          CURRENT_HASH=$(jq -r '.packages[0].manifest.ipkHash.sha256' webosbrew/apps.json)

          if [ "$VERSION" != "$CURRENT_VERSION" ] || [ "$IPK_HASH" != "$CURRENT_HASH" ]; then
            echo "Nuova versione rilevata! Aggiorno webosbrew/apps.json..."
            
            # Utilizza jq per sovrascrivere correttamente solo i campi di "packages"
            jq --arg ver "$VERSION" \
               --arg url "$IPK_URL" \
               --argjson size "$IPK_SIZE" \
               --arg hash "$IPK_HASH" \
               '.packages[0].manifest.version = $ver |
                .packages[0].manifest.ipkUrl = $url |
                .packages[0].manifest.ipkSize = $size |
                .packages[0].manifest.ipkHash.sha256 = $hash ' \
               webosbrew/apps.json > temp.json
            
            # Sostituisci il vecchio file con quello aggiornato
            mv temp.json webosbrew/apps.json
          else
            echo "Il file apps.json è già aggiornato all'ultima release."
          fi

      - name: Commit e Push delle modifiche
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add webosbrew/apps.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update of apps.json" && git push)
